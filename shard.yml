name: enkaidu
version: 0.9.0-pre
license: MPL-2.0
description: Command line tool that can use local and remote AI models to assist
  with local editing and refinement tasks.
authors:
  - nogginly <nogginly@icloud.com>
repository: https://github.com/enkaidu-dev/enkaidu

development_dependencies:
  ameba:
    github: crystal-ameba/ameba
  spectator:
    gitlab: arctic-fox/spectator

dependencies:
  termify:
    github: nogginly/termify.cr
    version: 0.5.0
  liquid:
    github: amberframework/liquid.cr
    version: 1.0.0
  json-schema:
    github: spider-gazelle/json-schema
    version: 1.3.2
  reply:
    github: I3oris/reply
    version: 0.4.0
  html5:
    github: naqvis/crystal-html5
    version: 0.7.0
  # --- tartrazine from termify already pulls in ...
  #     noting this since Enkaidu uses this shard directly
  # baked_file_system:
  #   github: schovi/baked_file_system
  #   version: 0.13.0
  # ------

targets:
  enkaidu:
    main: src/main.cr
